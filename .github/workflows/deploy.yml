name: Deploy Clean Site

on:
  push:
    branches:
      - source  # 只有當 source 分支有變動時才執行

permissions:
  contents: write  # 重要：給予機器人寫入 main 分支的權限

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級到 v4，解決黃色警告訊息

      - name: Remove Admin UI
        run: |
          # 刪除 HTML 中的管理面板區塊
          sed -i '//,//d' index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # 部署當前資料夾
          branch: main     # 部署到 main 分支
          clean: true
