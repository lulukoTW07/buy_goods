name: Deploy Clean Site

on:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove Admin UI
        run: |
          # 這次我們用更強大的語法，確保包含起始與結束標記都一併切除
          sed -i '//,//d' index.html
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: main
          clean: true
