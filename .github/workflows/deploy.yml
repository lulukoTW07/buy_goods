name: Deploy Clean Site

on:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove Admin UI
        run: |
          # 使用一個更直觀的寫法來刪除區塊
          # 這會尋找包含 admin-start 到 admin-end 的行並將其刪除
          sed -i '//,//d' index.html
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: main
          clean: true
