<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERIN在賣東西</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">◈</span>
        <div>
          <h1>ERIN在賣東西</h1>
          <p class="tagline">若有問題請至噗浪@fly811
          所有在標題上的商品價格皆不含運。
          </p>
        </div>
      </div>
  <div class="admin-panel" id="adminPanel" style="display:none;">
    <div class="admin-inner">
      <h2>🛠 管理模式</h2>
      <div class="admin-actions">
        <button class="btn-action" id="addProductBtn">＋ 新增商品</button>
        <button class="btn-action secondary" id="manageTagsBtn">🏷 管理標籤</button>
        <button class="btn-action secondary" id="exportBtn">📤 匯出資料</button>
        <label class="btn-action secondary" for="importFile">📥 匯入資料</label>
        <input type="file" id="importFile" accept=".json" style="display:none" />
      </div>
    </div>
  </div>
   <!-- admin-end -->

  <!-- Controls -->
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="搜尋商品名稱…" />
      </div>
      <div class="filter-tags" id="filterTags">
        <button class="tag-btn active" data-tag="全部">全部</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">最新上架</option>
        <option value="oldest">最早上架</option>
        <option value="name">名稱 A→Z</option>
      </select>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="main-content">
    <div class="product-grid" id="productGrid">
      <!-- Products rendered by JS -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>沒有符合條件的商品</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 ERIN</p>
  </footer>

  <!-- ===== MODAL: Product Detail ===== -->
  <div class="modal-overlay" id="productModal" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="" />
        <div class="modal-badge" id="modalCondition"></div>
      </div>
      <div class="modal-info">
        <div class="modal-tags" id="modalTags"></div>
        <h2 id="modalName"></h2>
        <div class="modal-meta">
          <div class="meta-item"><span class="meta-label">📍 產地</span><span id="modalOrigin">—</span></div>
          <div class="meta-item"><span class="meta-label">📅 購買日期</span><span id="modalPurchaseDate">—</span></div>
          <div class="meta-item"><span class="meta-label">🔍 損傷狀況</span><span id="modalDamage">—</span></div>
        </div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-stores" id="modalStores"></div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Add / Edit Product ===== -->
  <div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal-box edit-modal-box">
      <button class="modal-close" id="editClose">✕</button>
      <h2 id="editTitle">新增商品</h2>
      <div class="form-scroll">
        <input type="hidden" id="editId" />
        <label>商品名稱 *<input type="text" id="editName" placeholder="例：Sony 相機 A6400" /></label>
        <label>商品圖片 URL<input type="text" id="editImage" placeholder="https://..." /></label>
        <label>商品描述<textarea id="editDesc" rows="3" placeholder="簡短描述商品狀況、附件等…"></textarea></label>
        <div class="form-row">
          <label>產地<input type="text" id="editOrigin" placeholder="日本" /></label>
          <label>購買日期<input type="text" id="editPurchaseDate" placeholder="2023-06" /></label>
        </div>
        <label>損傷狀況 *
          <select id="editDamage">
            <option value="全新未拆">全新未拆</option>
            <option value="近全新">近全新（幾乎無使用痕跡）</option>
            <option value="輕微使用痕跡">輕微使用痕跡</option>
            <option value="有明顯損傷">有明顯損傷（已描述）</option>
          </select>
        </label>
        <label>標籤（可多選）
          <div class="tag-picker" id="tagPicker"></div>
        </label>
        <div id="storeList" class="store-list"></div>
        <button class="btn-add-store" id="addStoreBtn" type="button">＋ 新增賣場連結</button>
        <div class="form-actions">
          <button class="btn-action" id="saveProductBtn">儲存商品</button>
          <button class="btn-action secondary" id="cancelEditBtn">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Manage Tags ===== -->
  <div class="modal-overlay" id="tagsModal" style="display:none;">
    <div class="modal-box tags-modal-box">
      <button class="modal-close" id="tagsClose">✕</button>
      <h2>管理標籤</h2>
      <div class="tag-manager">
        <div class="tag-input-row">
          <input type="text" id="newTagInput" placeholder="輸入新標籤名稱…" />
          <button class="btn-action" id="addTagBtn">新增</button>
        </div>
        <div class="existing-tags" id="existingTags"></div>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
